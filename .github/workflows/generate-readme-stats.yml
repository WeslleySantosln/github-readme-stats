name: Generate GitHub Readme Stats

on:
  schedule:
    - cron: "0 */12 * * *" # a cada 12h
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Generate stats
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          node ./api/index.js > stats.svg
          node ./api/top-langs.js > top-langs.svg

      - name: Commit SVGs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add stats.svg top-langs.svg
          git commit -m "chore: update readme stats" || echo "No changes"
          git push
