name: Generate README Stats

on:
  schedule:
    - cron: '0 */6 * * *'  # A cada 6 horas
  workflow_dispatch:  # Permite executar manualmente
  push:
    branches: [master, main]

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install dependencies
        run: npm install
      
      - name: Generate SVGs
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          node scripts/stats.mjs 2>/dev/null | tail -n +2 > stats.svg
          node scripts/top-langs.mjs 2>/dev/null | tail -n +2 > top-langs.svg
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Descarta mudanças no package-lock.json
          git restore package-lock.json 2>/dev/null || true
          
          # Adiciona apenas os SVGs
          git add stats.svg top-langs.svg
          
          # Commit e push apenas se houver mudanças nos SVGs
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update github readme stats" && git push)
